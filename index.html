<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO meta -->
    <title>Cyrus Residential Care Consultancy</title>
    <meta
      name="description"
      content="Professional consultancy and compliance support for children's residential care providers in England. Regulation 44 visits, mock inspections, and compliance audits."
    />
    <meta name="theme-color" content="#0B1B3D" />

    <!-- Favicons -->
    <link rel="icon" type="image/jpeg" href="/favicon.jpeg" />

    <!-- Google Fonts preconnect for performance (design.md §5) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Cyrus Residential Care Consultancy" />
    <meta
      property="og:description"
      content="Professional consultancy and compliance support for children's residential care providers in England."
    />
    <meta property="og:locale"      content="en_GB" />

    <!-- Structured data – Local Business (helps SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Cyrus Residential Care Consultancy",
        "description": "Professional consultancy and compliance support for children's residential care providers in England.",
        "areaServed": "England",
        "legalName": "Cyrus Residential Care Consultancy Ltd",
        "identifier": {
          "@type": "PropertyValue",
          "name": "Companies House Number",
          "value": "17218588"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
